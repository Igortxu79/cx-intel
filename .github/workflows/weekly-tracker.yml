name: Weekly CX Intel Tracker

on:
  schedule:
    # Every Friday at 06:30 UTC = 07:30 CET (UTC+1) / 08:30 CEST (UTC+2 in summer)
    - cron: '30 6 * * 5'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI for testing

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic requests

      - name: Run CX Intel Tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python tracker.py

      - name: Commit and push updated data
        run: |
          git config user.name "CX Intel Bot"
          git config user.email "bot@smt-tech.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Weekly update — $(date +'%Y-%m-%d')"
          git push
